<meta charset="UTF-8">

<style>
:root {
  --bg: #f5f6fa; --surface: #fff; --ink: #1a1a2e; --muted: #888;
  --accent: #2563eb; --accent2: #7c3aed; --danger: #dc2626;
  --success: #059669; --warning: #d97706;
  --rule: #e5e7eb; --radius: 10px; --shadow: 0 1px 3px rgba(0,0,0,.08);
  --sidebar-w: 240px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex}

/* Login */
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}
.login-box{background:var(--surface);border-radius:16px;padding:40px 36px;width:380px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.15);text-align:center}
.login-box h2{font-size:22px;margin-bottom:6px}
.login-box p{color:var(--muted);font-size:14px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:2px solid var(--rule);border-radius:10px;font-size:16px;outline:none;transition:border-color .2s;text-align:center;letter-spacing:4px}
.login-box input:focus{border-color:var(--accent)}
.login-box .login-btn{width:100%;margin-top:16px;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;transition:opacity .2s}
.login-box .login-btn:hover{opacity:.9}
.login-error{color:var(--danger);font-size:13px;margin-top:10px;display:none}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--rule);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-brand{padding:24px 20px;border-bottom:1px solid var(--rule)}
.sidebar-brand h3{font-size:16px;color:var(--ink)}
.sidebar-brand span{font-size:12px;color:var(--muted)}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;color:var(--muted);font-size:14px;transition:all .15s;border-left:3px solid transparent;margin:2px 0}
.nav-item:hover{background:#f0f1f5;color:var(--ink)}
.nav-item.active{background:#eff6ff;color:var(--accent);border-left-color:var(--accent);font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--rule);font-size:12px;color:var(--muted);display:flex;justify-content:space-between}
.sidebar-footer a{color:var(--accent);text-decoration:none;cursor:pointer}

/* Main */
.main{flex:1;margin-left:var(--sidebar-w);padding:32px;overflow-y:auto;min-height:100vh}
.page-title{font-size:24px;font-weight:700;margin-bottom:24px}

/* Cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-icon.blue{background:#eff6ff;color:var(--accent)}
.stat-icon.purple{background:#f3e8ff;color:var(--accent2)}
.stat-icon.green{background:#ecfdf5;color:var(--success)}
.stat-icon.orange{background:#fff7ed;color:var(--warning)}
.stat-info .stat-val{font-size:22px;font-weight:700;line-height:1.2}
.stat-info .stat-label{font-size:12px;color:var(--muted)}

/* Panel */
.panel{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:24px;overflow:hidden}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--rule);font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.panel-body{padding:20px}

/* File Tree */
.tree{font-size:14px;line-height:2}
.tree-dir,.tree-file{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .15s}
.tree-dir:hover,.tree-file:hover{background:#f0f1f5}
.tree-dir .arrow{font-size:10px;width:14px;text-align:center;transition:transform .2s;display:inline-block}
.tree-dir.open>.arrow{transform:rotate(90deg)}
.tree-children{display:none;padding-left:20px}
.tree-children.show{display:block}
.tree-icon{width:18px;text-align:center;font-size:13px}
.tree-icon.dir{color:var(--warning)}
.tree-icon.file{color:var(--muted)}
.tree-size{font-size:11px;color:var(--muted);margin-left:auto}
.tree-file a{color:var(--ink);text-decoration:none}
.tree-file a:hover{color:var(--accent)}

/* Storage bar */
.storage-bars{display:flex;flex-direction:column;gap:12px}
.storage-row{display:flex;align-items:center;gap:12px}
.storage-label{width:140px;font-size:13px;flex-shrink:0}
.storage-bar-wrap{flex:1;height:22px;background:#f0f1f5;border-radius:6px;overflow:hidden;position:relative}
.storage-bar{height:100%;border-radius:6px;transition:width .5s}
.storage-bar.blue{background:var(--accent)}
.storage-bar.purple{background:var(--accent2)}
.storage-bar.green{background:var(--success)}
.storage-bar.orange{background:var(--warning)}
.storage-val{font-size:12px;color:var(--muted);width:60px;text-align:right;flex-shrink:0}

/* Page list */
.page-table{width:100%;border-collapse:collapse;font-size:14px}
.page-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--rule);color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase}
.page-table td{padding:10px 12px;border-bottom:1px solid var(--rule)}
.page-table tr:hover td{background:#f8f9fb}
.page-table .type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.type-badge.article{background:#eff6ff;color:var(--accent)}
.type-badge.study{background:#f3e8ff;color:var(--accent2)}
.type-badge.quiz{background:#ecfdf5;color:var(--success)}
.type-badge.system{background:#fef3c7;color:var(--warning)}
.page-table a{color:var(--accent);text-decoration:none}
.page-table a:hover{text-decoration:underline}

/* Sections */
.section{display:none}
.section.active{display:block}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:60px;overflow:hidden}
  .sidebar .nav-item span:not(.icon),.sidebar-brand h3,.sidebar-brand span{display:none}
  .sidebar .nav-item{justify-content:center;padding:12px}
  .main{margin-left:60px;padding:16px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}

/* Back to blog */
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:20px;transition:color .15s}
.back-link:hover{color:var(--accent)}

if (sessionStorage.getItem(SESSION_KEY) === '1') {
  document.getElementById('loginOverlay').style.display = 'none';
}

document.getElementById('loginBtn').addEventListener('click', function() {
  var input = document.getElementById('pwdInput').value;
  if (input === CORRECT_PWD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('loginOverlay').style.display = 'none';
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
});

document.getElementById('pwdInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('logoutBtn').addEventListener('click', function() {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
});

// ===== Render File Tree =====
function renderTree(nodes, container) {
  nodes.forEach(function(node) {
    if (node.type === 'dir') {
      var div = document.createElement('div');
      div.className = 'tree-dir';
      div.innerHTML = '<span class="arrow">▶</span><span class="tree-icon dir">📁</span><span>' + node.name + '</span>';
      var children = document.createElement('div');
      children.className = 'tree-children';
      if (node.children) renderTree(node.children, children);
      div.addEventListener('click', function(e) {
        e.stopPropagation();
        div.classList.toggle('open');
        children.classList.toggle('show');
      });
      container.appendChild(div);
      container.appendChild(children);
    } else {
      var div = document.createElement('div');
      div.className = 'tree-file';
      var label = node.path && node.path !== '/' ? '<a href="' + node.path + '" target="_blank">' + node.name + '</a>' : node.name;
      div.innerHTML = '<span style="width:14px"></span><span class="tree-icon file">📄</span>' + label + '<span class="tree-size">' + (node.size || '') + '</span>';
      container.appendChild(div);
    }
  });
}
