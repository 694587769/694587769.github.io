      <script>
      (function() {
        var list = document.getElementById('articleList');
        if (!list) return;
        var rows = Array.from(list.querySelectorAll('.article-row'));
        var viewsReady = false;
        var pendingCount = 0;
        var completedCount = 0;

        function checkReady() {
          completedCount++;
          if (completedCount >= pendingCount && pendingCount > 0) {
            viewsReady = true;
          }
        }

        function fetchViews(uri, el) {
          var cb = 'bz_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
          window[cb] = function(data) {
            var pv = (data && data.page_pv) ? data.page_pv : 0;
            el.textContent = pv;
            var row = el.closest('.article-row');
            if (row) row.dataset.views = pv;
            delete window[cb];
            var s = document.getElementById('bz_s_' + cb);
            if (s) s.parentNode.removeChild(s);
            checkReady();
          };
          var script = document.createElement('script');
          script.id = 'bz_s_' + cb;
          script.src = 'https://busuanzi.ibruce.info/busuanzi?jsonpCallback=' + encodeURIComponent(cb) + '&uri=' + encodeURIComponent(uri);
          document.head.appendChild(script);
          // 超时处理
          setTimeout(function() {
            if (window[cb]) {
              window[cb]({page_pv: 0});
            }
          }, 5000);
        }

        rows.forEach(function(row) {
          var viewsEl = row.querySelector('.views-value');
          var uri = row.querySelector('.article-row-views');
          if (viewsEl && uri && uri.dataset.uri) {
            pendingCount++;
            fetchViews(uri.dataset.uri, viewsEl);
          }
        });

        document.querySelectorAll('.sort-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var sortBy = this.dataset.sort;
            var order = this.dataset.order;

            if (sortBy === 'views' && !viewsReady) {
              // 阅读量数据尚未全部加载，不做排序
              return;
            }

            if (this.classList.contains('active')) {
              order = order === 'asc' ? 'desc' : 'asc';
              this.dataset.order = order;
            } else {
              document.querySelectorAll('.sort-btn').forEach(function(b) { b.classList.remove('active'); });
              this.classList.add('active');
            }

            rows.sort(function(a, b) {
              var aVal, bVal;
              if (sortBy === 'name') {
                aVal = (a.dataset.name || '').toLowerCase();
                bVal = (b.dataset.name || '').toLowerCase();
              } else if (sortBy === 'date') {
                aVal = parseInt(a.dataset.date) || 0;
                bVal = parseInt(b.dataset.date) || 0;
              } else if (sortBy === 'views') {
                aVal = parseInt(a.dataset.views) || 0;
                bVal = parseInt(b.dataset.views) || 0;
              }
              if (aVal < bVal) return order === 'asc' ? -1 : 1;
              if (aVal > bVal) return order === 'asc' ? 1 : -1;
              return 0;
            });

            rows.forEach(function(row) { list.appendChild(row); });
          });
        });
      })();
      </script>

<script>
// ================================================================
// 自定义本地搜索弹窗（弹窗式列表结果）
// ================================================================
(function() {
  var searchData = null;
  var $overlay = null;

  function loadSearchData() {
    return new Promise(function(resolve, reject) {
      if (searchData) {
        resolve(searchData);
        return;
      }
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/search.json');
      xhr.onload = function() {
        try {
          searchData = JSON.parse(xhr.responseText);
          resolve(searchData);
        } catch (e) {
          reject(e);
        }
      };
      xhr.onerror = reject;
      xhr.send();
    });
  }

  function createSearchOverlay() {
    if ($overlay) return;
    var overlay = document.createElement('div');
    overlay.className = 'search-overlay';
    overlay.innerHTML = '<div class="search-panel">' +
      '<div class="search-panel-header">' +
        '<i class="search-panel-icon fa fa-search"></i>' +
        '<input class="search-panel-input" placeholder="输入关键词搜索...">' +
        '<button class="search-panel-close"><i class="fa fa-times"></i></button>' +
      '</div>' +
      '<div class="search-panel-body">' +
        '<div class="search-panel-hint">请输入关键词开始搜索</div>' +
      '</div>' +
    '</div>';

    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) {
        closeSearch();
      }
    });

    var closeBtn = overlay.querySelector('.search-panel-close');
    closeBtn.addEventListener('click', closeSearch);

    var input = overlay.querySelector('.search-panel-input');
    input.addEventListener('input', debounce(function(e) {
      doSearch(e.target.value);
    }, 150));

    // ESC 关闭
    document.addEventListener('keydown', function escHandler(e) {
      if (e.key === 'Escape') { closeSearch(); }
    });

    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden';
    setTimeout(function() { input.focus(); }, 100);
    $overlay = overlay;
  }

  function closeSearch() {
    if (!$overlay) return;
    $overlay.classList.add('closing');
    setTimeout(function() {
      if ($overlay && $overlay.parentNode) {
        $overlay.parentNode.removeChild($overlay);
      }
      $overlay = null;
      document.body.style.overflow = '';
    }, 200);
  }

  function debounce(fn, delay) {
    var timer;
    return function() {
      var context = this;
      var args = arguments;
      clearTimeout(timer);
      timer = setTimeout(function() {
        fn.apply(context, args);
      }, delay);
    };
  }

  function doSearch(query) {
    query = query.trim().toLowerCase();
    if (!query) {
      var body = $overlay.querySelector('.search-panel-body');
      body.innerHTML = '<div class="search-panel-hint">请输入关键词开始搜索</div>';
      return;
    }

    if (!searchData) {
      loadSearchData().then(function() {
        doSearch(query);
      });
      return;
    }

    var results = [];
    for (var i = 0; i < searchData.length; i++) {
      var item = searchData[i];
      var title = item.title.toLowerCase();
      var content = item.content.toLowerCase();
      if (title.indexOf(query) >= 0 || content.indexOf(query) >= 0) {
        results.push({
          title: item.title,
          url: item.url,
          content: content
        });
      }
    }

    var body = $overlay.querySelector('.search-panel-body');
    if (results.length === 0) {
      body.innerHTML = '<div class="search-panel-empty">' +
        '<i class="fa fa-search" style="font-size:2em;display:block;margin-bottom:12px;color:#ddd6cc;"></i>' +
        '没有找到任何结果</div>';
      return;
    }

    var html = '<div class="search-panel-count">找到 ' + results.length + ' 个结果</div>';
    for (var j = 0; j < results.length; j++) {
      var r = results[j];
      var excerpt = r.content.replace(/<[^>]*>/g, '').substring(0, 180);
      var marked = highlightKeywords(excerpt, query);
      html += '<a class="search-result-item" href="' + r.url + '">' +
        '<div class="search-result-title">' + highlightKeywords(r.title, query) + '</div>' +
        '<div class="search-result-excerpt">' + marked + '...</div>' +
      '</a>';
    }
    body.innerHTML = html;

    // 点击结果项后关闭弹窗
    var items = body.querySelectorAll('.search-result-item');
    for (var k = 0; k < items.length; k++) {
      items[k].addEventListener('click', function() {
        setTimeout(closeSearch, 100);
      });
    }
  }

  function highlightKeywords(text, query) {
    var regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return text.replace(regex, '<span class="search-result-keyword">$1</span>');
  }

  // 添加自定义搜索触发器（因为 NexT local_search 已禁用）
  document.addEventListener('DOMContentLoaded', function() {
    loadSearchData();

    // 隐藏旧的 NexT 搜索切换按钮（已无功能）
    var oldToggle = document.querySelector('.site-nav-right .toggle.popup-trigger');
    if (oldToggle) {
      oldToggle.style.display = 'none';
    }

    // 在右侧导航区域添加搜索图标
    var siteNavRight = document.querySelector('.site-nav-right');
    if (siteNavRight) {
      var searchBtn = document.createElement('a');
      searchBtn.className = 'menu-item menu-item-search';
      searchBtn.href = 'javascript:;';
      searchBtn.title = '搜索';
      searchBtn.innerHTML = '<i class="fa fa-search"></i>';
      searchBtn.addEventListener('click', function(e) {
        e.preventDefault();
        createSearchOverlay();
      });
      // 插入到第一个子元素之前
      siteNavRight.insertBefore(searchBtn, siteNavRight.firstChild);
    }

    // 在导航菜单末尾添加搜索菜单项
    var menuList = document.querySelector('.menu');
    if (menuList) {
      var searchMenuItem = document.createElement('li');
      searchMenuItem.className = 'menu-item menu-item-search';
      var searchLink = document.createElement('a');
      searchLink.href = 'javascript:;';
      searchLink.className = 'menu-item-search-link';
      searchLink.innerHTML = '<i class="fa fa-search"></i> 搜索';
      searchLink.addEventListener('click', function(e) {
        e.preventDefault();
        createSearchOverlay();
      });
      searchMenuItem.appendChild(searchLink);
      menuList.appendChild(searchMenuItem);
    }
  });
})();

// ================================================================
// 樱花飘落动画
// ================================================================
document.addEventListener('DOMContentLoaded', function() {
  // 创建画布
  var canvas = document.createElement('canvas');
  canvas.id = 'petal-canvas';
  document.body.appendChild(canvas);

  var ctx = canvas.getContext('2d');
  var width = canvas.width = window.innerWidth;
  var height = canvas.height = window.innerHeight;
  var petals = [];
  var maxPetals = 30;

  // 樱花花瓣参数
  var colors = [
    'rgba(255, 222, 233, 0.55)',
    'rgba(255, 235, 240, 0.45)',
    'rgba(255, 240, 245, 0.35)',
    'rgba(250, 240, 245, 0.25)'
  ];

  function Petal() {
    this.x = Math.random() * width;
    this.y = -20;
    this.size = Math.random() * 8 + 3;
    this.speed = Math.random() * 1.5 + 0.5;
    this.angle = Math.random() * 360;
    this.spin = Math.random() < 0.5 ? -1 : 1;
    this.rotation = Math.random() * 360;
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.swingSpeed = Math.random() * 0.02 + 0.005;
  }

  Petal.prototype.update = function() {
    this.y += this.speed;
    this.x += Math.sin(this.angle) * 0.8;
    this.angle += this.swingSpeed;
    this.rotation += this.spin * 0.5;
    if (this.y > height + 10) {
      this.y = -10;
      this.x = Math.random() * width;
    }
  };

  Petal.prototype.draw = function() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation * Math.PI / 180);
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size/2, this.size, 0, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  };

  function init() {
    petals = [];
    for (var i = 0; i < maxPetals; i++) {
      petals.push(new Petal());
    }
  }

  function animate() {
    ctx.clearRect(0, 0, width, height);
    for (var i = 0; i < petals.length; i++) {
      petals[i].update();
      petals[i].draw();
    }
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', function() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  });

  init();
  animate();
});

  var siteNav = document.querySelector('.site-nav');
  if (siteNav) {
    var sig = document.createElement('div');
    sig.className = 'signature-line';
    sig.textContent = '鸿爪踏雪泥，还是来得及';
    siteNav.parentNode.insertBefore(sig, siteNav);
  }
});

// ================================================================
// 夜间模式切换（浮动侧边按钮，默认暖色调，不记忆偏好）
// ================================================================
(function() {
  var isDark = false;

  function applyDarkMode(dark) {
    isDark = dark;
    if (dark) {
      document.documentElement.classList.add('dark-mode');
    } else {
      document.documentElement.classList.remove('dark-mode');
    }
    updateIcon();
  }

  function updateIcon() {
    var btn = document.getElementById('dark-toggle-float');
    if (!btn) return;
    if (isDark) {
      btn.innerHTML = '<i class="fa fa-sun-o"></i>';
      btn.title = '切换日间模式';
    } else {
      btn.innerHTML = '<i class="fa fa-moon-o"></i>';
      btn.title = '切换夜间模式';
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    // 默认始终暖色调
    applyDarkMode(false);

    // 创建浮动侧边按钮
    var btn = document.createElement('button');
    btn.id = 'dark-toggle-float';
    btn.className = 'dark-toggle-float';
    btn.innerHTML = '<i class="fa fa-moon-o"></i>';
    btn.title = '切换夜间模式';
    btn.addEventListener('click', function() {
      applyDarkMode(!isDark);
    });
    document.body.appendChild(btn);

    // 替换页脚文字
    var withLove = document.querySelector('.with-love');
    if (withLove) {
      var parent = withLove.parentNode;
      var newSpan = document.createElement('span');
      newSpan.textContent = 'Created by ';
      newSpan.style.color = '#b5a898';
      parent.replaceChild(newSpan, withLove);
    }
  });
})();
</script>
</body>
</html>
