<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苦瓜与吉姆餐厅 - Kindle</title>
<style>
  /* Kindle E-Ink 优化：仅使用基础 CSS，支持旧版 WebKit (Safari 5 / Kindle 3.0+) */
  * { margin: 0; padding: 0; }
  body {
    font-family: serif;
    font-size: 16px;
    line-height: 1.6;
    color: #000;
    background: #fff;
    padding: 12px;
    max-width: 100%;
    word-wrap: break-word;
  }
  h1 {
    font-size: 22px;
    margin: 12px 0 4px 0;
    padding-bottom: 8px;
    border-bottom: 2px solid #000;
  }
  h2 {
    font-size: 18px;
    margin: 20px 0 8px 0;
    padding: 6px 0;
    border-bottom: 1px solid #000;
  }
  p { margin: 4px 0; }
  a { color: #000; text-decoration: underline; }
  a:visited { color: #333; }

  .nav {
    margin: 8px 0 16px 0;
    padding: 8px 0;
    border-bottom: 1px solid #000;
    font-size: 14px;
  }
  .nav a { margin-right: 12px; }

  .item {
    padding: 10px 0;
    border-bottom: 1px solid #ccc;
    display: block;
  }
  .item:last-child { border-bottom: none; }
  .item .tag {
    display: inline-block;
    font-size: 11px;
    padding: 1px 6px;
    border: 1px solid #000;
    margin-right: 6px;
    vertical-align: middle;
  }
  .item .title {
    font-size: 16px;
    font-weight: bold;
    display: inline;
  }
  .item .meta {
    font-size: 13px;
    color: #333;
    margin-top: 2px;
  }
  .item .desc {
    font-size: 13px;
    color: #333;
    margin-top: 2px;
  }

  .footer {
    margin-top: 24px;
    padding-top: 12px;
    border-top: 1px solid #000;
    font-size: 12px;
    color: #333;
  }
  .loading { text-align: center; padding: 40px 0; color: #333; }
  .error { text-align: center; padding: 40px 0; color: #000; }
  .back-link { display: block; margin: 16px 0; font-size: 14px; }
  .section-jump { margin: 8px 0 16px 0; font-size: 14px; }
  .section-jump a { margin-right: 10px; }
</style>
</head>
<body>

<h1>苦瓜与吉姆餐厅</h1>
<p>Anqing Peng 的个人博客</p>

<div class="nav">
  <a href="#articles">文章</a>
  <a href="#study">学习资料</a>
  <a href="#quiz">题库</a>
  <a href="https://694587769.github.io/">桌面版</a>
</div>

<div id="content"><div class="loading">加载中...</div></div>

<div class="footer">
  <p>&copy; 2018-2026 Anqing Peng</p>
  <p>本站点总字数约 43.8 万字，阅读时长约 18.2 小时</p>
  <p>页面专为 Kindle E-Ink 浏览器优化</p>
</div>

<script>
// Kindle 3.0+ 浏览器兼容脚本（仅使用 ES3 语法，兼容旧版 WebKit 531）
(function() {
  var BASE = 'https://694587769.github.io';
  var el = document.getElementById('content');

  function showError(msg) {
    el.innerHTML = '<div class="error">' + msg + '</div>';
  }

  function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function renderCategory(name, items, tag) {
    var html = '<h2 id="' + name + '">' + tag + ' (' + items.length + ')</h2>';
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      html += '<div class="item">';
      html += '<span class="tag">' + escHtml(tag) + '</span>';
      html += '<a class="title" href="' + BASE + item.url + '">' + escHtml(item.title) + '</a>';
      if (item.excerpt) {
        html += '<div class="desc">' + escHtml(item.excerpt) + '</div>';
      }
      html += '<div class="meta">' + item.date;
      if (item.size) { html += ' &middot; ' + escHtml(item.size); }
      if (item.count) { html += ' &middot; ' + item.count + '题'; }
      html += '</div>';
      html += '</div>';
    }
    return html;
  }

  function renderAll(data) {
    var html = '';

    // 文章
    if (data.articles && data.articles.length > 0) {
      html += renderCategory('articles', data.articles, '文章');
    }

    // 学习资料
    if (data.study && data.study.length > 0) {
      html += renderCategory('study', data.study, '学习资料');
    }

    // 题库
    if (data.quiz && data.quiz.length > 0) {
      html += renderCategory('quiz', data.quiz, '题库');
    }

    if (!html) {
      html = '<div class="error">暂无内容</div>';
    }

    html += '<div class="back-link"><a href="#top">返回顶部</a></div>';
    el.innerHTML = html;
  }

  // 使用 XMLHttpRequest（兼容 Kindle 旧版浏览器，不支持 fetch）
  var xhr = new XMLHttpRequest();
  xhr.open('GET', BASE + '/manifest.json', true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          renderAll(data);
        } catch (e) {
          showError('数据解析失败，请刷新重试。');
        }
      } else {
        showError('加载失败（HTTP ' + xhr.status + '），请检查网络连接。');
      }
    }
  };
  xhr.onerror = function() {
    showError('网络连接失败，请确认 Wi-Fi 已连接。');
  };
  xhr.send();
})();
</script>

</body>
</html>
